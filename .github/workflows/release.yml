name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: matroska-tags-editor-macOS-arm64
          - platform: windows-latest
            artifact: matroska-tags-editor-Windows-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies on macOS
        if: runner.os == 'macOS'
        run: brew install libebml libmatroska wxwidgets

      - name: Bootstrap vcpkg on Windows
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          else
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: |
          ZIP_NAME="${{ matrix.artifact }}.zip"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            zip -r9 "${ZIP_NAME}" build/*.app
          else
            EXE_PATH=$(find build -name "matroska-tags-editor.exe" | head -n 1)
            7z a "${ZIP_NAME}" "${EXE_PATH}"
          fi
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            powershell -Command "(Get-FileHash -Path .\\${ZIP_NAME} -Algorithm SHA256).Hash.ToLower() + '  ' + '${ZIP_NAME}' | Out-File -FilePath .\\${ZIP_NAME}.sha256 -Encoding ascii"
          else
            shasum -a 256 "${ZIP_NAME}" > "${ZIP_NAME}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}
          path: |
            *.zip
            *.zip.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create and upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
