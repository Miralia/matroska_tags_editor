name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for changelog generation

      - name: Generate changelog
        id: changelog
        uses: anothrNick/github-tag-action@1.69.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm install --frozen-lockfile

      - name: Build Tauri application
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Package and generate checksum
        shell: bash
        run: |
          APP_NAME=$(sed -n 's/^name = "\(.*\)"/\1/p' src-turi/Cargo.toml | head -n 1)
          
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            ARCHIVE_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/${APP_NAME}.app"
            ZIP_NAME="${APP_NAME}-macOS-arm64.zip"
            zip -r9 "${ZIP_NAME}" "${ARCHIVE_PATH}"
          else
            # For Windows, find the .exe and zip it
            EXE_PATH=$(find src-tauri/target/${{ matrix.target }}/release -maxdepth 1 -name "*.exe" | head -n 1)
            ZIP_NAME="${APP_NAME}-Windows-x64.zip"
            7z a "${ZIP_NAME}" "${EXE_PATH}"
          fi
          
          shasum -a 256 "${ZIP_NAME}" > "${ZIP_NAME}.sha256"

      - name: Create and upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            *.zip
            *.zip.sha256
